schemaVersion: 2.0.0

fileExistenceTests:
  # ── Build tools must NOT be present ────────────────────────────────────────
  - name: "no go sdk"
    path: "/usr/local/go"
    shouldExist: false
  - name: "no rust toolchain"
    path: "/root/.cargo"
    shouldExist: false

  # ── Application binaries ────────────────────────────────────────────────────
  - name: "go server binary"
    path: "/usr/bin/authentik-server"
    shouldExist: true
  - name: "rust worker binary"
    path: "/usr/bin/authentik"
    shouldExist: true
  - name: "python3.14 interpreter"
    path: "/usr/bin/python3.14"
    shouldExist: true
  - name: "python3 wrapper script"
    path: "/usr/bin/python3"
    shouldExist: true
  - name: "python wrapper script"
    path: "/usr/bin/python"
    shouldExist: true
  - name: "bash shell"
    path: "/usr/bin/bash"
    shouldExist: true

  # ── Lifecycle entrypoint ────────────────────────────────────────────────────
  - name: "lifecycle script"
    path: "/lifecycle/ak"
    shouldExist: true

  # ── Web frontend ────────────────────────────────────────────────────────────
  - name: "web ui dist"
    path: "/web/dist"
    shouldExist: true
  - name: "web brand assets"
    path: "/web/authentik"
    shouldExist: true

  # ── Django application source ───────────────────────────────────────────────
  - name: "django app package"
    path: "/authentik"
    shouldExist: true
  - name: "blueprints directory"
    path: "/blueprints"
    shouldExist: true
  - name: "schemas directory"
    path: "/schemas"
    shouldExist: true
  - name: "locale directory"
    path: "/locale"
    shouldExist: true
  - name: "django manage.py"
    path: "/manage.py"
    shouldExist: true

  # ── Python virtual environment ──────────────────────────────────────────────
  - name: "python venv"
    path: "/ak-root/.venv"
    shouldExist: true
  - name: "packages symlink"
    path: "/packages"
    shouldExist: true

  # ── System files (critical for bare-base migration) ─────────────────────────
  - name: "etc passwd"
    path: "/etc/passwd"
    shouldExist: true
  - name: "etc group"
    path: "/etc/group"
    shouldExist: true
  - name: "etc nsswitch.conf"
    path: "/etc/nsswitch.conf"
    shouldExist: true
  - name: "ca certificates bundle"
    path: "/etc/ssl/certs/ca-certificates.crt"
    shouldExist: true
  - name: "os-release"
    path: "/etc/os-release"
    shouldExist: true
  - name: "krb5 config"
    path: "/etc/krb5.conf"
    shouldExist: true

  # ── Runtime directories ─────────────────────────────────────────────────────
  - name: "certs directory"
    path: "/certs"
    shouldExist: true
  - name: "data directory"
    path: "/data"
    shouldExist: true
  - name: "media directory"
    path: "/media"
    shouldExist: true
  - name: "data/media symlink"
    path: "/data/media"
    shouldExist: true
  - name: "authentik ssh directory"
    path: "/authentik/.ssh"
    shouldExist: true

commandTests:
  - name: "bash version"
    command: "/usr/bin/bash"
    args: ["--version"]
    expectedOutput: ["GNU bash"]
  - name: "python interpreter version"
    command: "/usr/bin/python3.14"
    args: ["--version"]
    expectedOutput: ["Python 3\\.14\\."]
  - name: "python3 wrapper executes and runs imports"
    command: "/usr/bin/python3"
    args: ["-c", "import cryptography, django; print('OK')"]
    expectedOutput: ["OK"]
  - name: "compiled python extensions importable"
    # Verifies that .so stripping with --strip-debug preserved PyInit_* symbols
    # and that the venv site-packages are correctly activated.
    command: "/ak-root/.venv/bin/python"
    args: ["-c", "import cryptography, lxml, xmlsec, django, psycopg; print('OK')"]
    expectedOutput: ["OK"]
  - name: "go server binary executes"
    command: "/usr/bin/authentik-server"
    args: ["--help"]
    exitCode: 0
  - name: "coreutils mkdir present"
    # lifecycle/ak calls mkdir -p at startup before any other command
    command: "/usr/bin/mkdir"
    args: ["--version"]
    expectedOutput: ["GNU coreutils"]
