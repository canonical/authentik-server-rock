name: ci
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-**"
    tags:
      - "v**"
    paths:
      - "rockcraft.yaml"
      - ".github/workflows/**.yaml"
  pull_request:
    branches:
      - "*"

jobs:
  get-architectures:
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.parse.outputs.architectures }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Parse platforms from rockcraft.yaml
        id: parse
        run: |
          archs=$(yq -o=json -I=0 '.platforms | keys' rockcraft.yaml)
          echo "Found architectures: $archs"
          echo "architectures=$archs" >> "$GITHUB_OUTPUT"

  build:
    needs: get-architectures
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.get-architectures.outputs.architectures) }}
    uses: canonical/identity-team/.github/workflows/_rock-build.yaml@83e6e76b28b0db96c133c16bbec121cba34a86db # v1.14.3
    with:
      structure-tests-enabled: true
      architecture: ${{ matrix.architecture }}

  gh-publish:
    permissions:
      packages: write
      contents: read
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build
    uses: canonical/identity-team/.github/workflows/_rock-gh-publish-third-party.yaml@83e6e76b28b0db96c133c16bbec121cba34a86db # v1.14.3

  oci-publish:
    # only release to oci-factory in case of release
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build
    uses: canonical/identity-team/.github/workflows/_rock-oci-publish.yaml@83e6e76b28b0db96c133c16bbec121cba34a86db # v1.14.3
    with:
      edge-release: false
      eol-stable-release: "3 month"
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  scan:
    permissions:
      packages: read
      contents: read
      security-events: write
      actions: read
    if: ${{ (github.ref == 'refs/heads/main') || (github.ref_type == 'tag') }}
    needs: gh-publish
    uses: canonical/identity-team/.github/workflows/_rock-scan.yaml@83e6e76b28b0db96c133c16bbec121cba34a86db # v1.14.3
    with:
      image: ${{ needs.gh-publish.outputs.image }}

  oci-update-pr-server:
    permissions:
      contents: write
      pull-requests: write
    needs: [gh-publish, scan]
    if: github.ref_type == 'tag'
    uses: canonical/identity-team/.github/workflows/oci-update-pr.yaml@83e6e76b28b0db96c133c16bbec121cba34a86db # v1.14.3
    with:
        oci-image: ${{ needs.gh-publish.outputs.image }}
        repository: canonical/authentik-server-operator
    secrets:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  oci-update-pr-worker:
    permissions:
      contents: write
      pull-requests: write
    needs: [gh-publish, scan]
    if: github.ref_type == 'tag'
    uses: canonical/identity-team/.github/workflows/oci-update-pr.yaml@83e6e76b28b0db96c133c16bbec121cba34a86db # v1.14.3
    with:
        oci-image: ${{ needs.gh-publish.outputs.image }}
        repository: canonical/authentik-worker-operator
    secrets:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}